<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Will you be my Valentine? 💕</title>
  <!-- Book experience styles -->
  <link rel="stylesheet" href="style.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

    :root {
      --bg-gradient: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
      --yes-green: #4ade80;
      --yes-green-hover: #22c55e;
      --no-red: #ef4444;
      --no-red-hover: #dc2626;
      --text-dark: #374151;
      --bg-card: rgba(255, 255, 255, 0.9);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: var(--bg-gradient);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: var(--text-dark);
      position: relative;
    }

    /* Floating Hearts Background */
    .hearts-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      display: none;
    }

    .card {
      background: var(--bg-card);
      padding: 2.5rem 2rem;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      text-align: center;
      max-width: 90%;
      width: 450px;
      z-index: 10;
      backdrop-filter: blur(10px);
      transition: all 0.5s ease;
      position: relative;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 1.2rem;
      color: #e11d48;
      transition: opacity 0.4s ease;
    }

    /* Teddy emoji label above GIF */
    #teddy-emoji {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      display: block;
      transition: opacity 0.4s ease;
    }

    .gif-container {
      margin-bottom: 1.5rem;
      height: 200px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
    }

    .gif-container img {
      max-width: 100%;
      max-height: 100%;
      border-radius: 12px;
      object-fit: contain;
      /* Fade transition for GIF swap */
      transition: opacity 0.35s ease;
    }

    /* Floating bob animation on the teddy */
    .teddy-float {
      animation: floatTeddy 3s ease-in-out infinite;
    }

    .buttons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      min-height: 100px;
      position: relative;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 0.8rem 1.5rem;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      color: white;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      white-space: nowrap;
    }

    .btn-yes {
      background-color: var(--yes-green);
    }

    .btn-yes:hover {
      background-color: var(--yes-green-hover);
      box-shadow: 0 0 15px var(--yes-green);
      transform: scale(1.05);
      /* Soft hover scale on its active size */
    }

    .btn-no {
      background-color: var(--no-red);
      position: relative;
    }

    .btn-no:hover {
      background-color: var(--no-red-hover);
    }

    /* Celebration Screen */
    .celebration-screen {
      display: none;
      text-align: center;
      z-index: 10;
      background: var(--bg-card);
      padding: 3rem 2rem;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      max-width: 90%;
      width: 500px;
      animation: fadeIn 1s ease forwards;
    }

    .celebration-screen h1 {
      font-size: 2.5rem;
      color: #e11d48;
      margin-bottom: 0.5rem;
    }

    .celebration-screen p {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      color: #fb7185;
      font-weight: 600;
    }

    .btn-book {
      background: linear-gradient(45deg, #f43f5e, #e11d48);
      font-size: 1.3rem;
      padding: 1rem 2rem;
      margin-top: 1.5rem;
    }

    .btn-book:hover {
      box-shadow: 0 0 20px rgba(244, 63, 94, 0.6);
      transform: scale(1.05);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
      backdrop-filter: blur(5px);
      animation: fadeIn 0.3s ease;
    }

    .modal {
      background: white;
      padding: 2.5rem;
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
    }

    .modal h2 {
      color: #e11d48;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .form-group {
      margin-bottom: 1.2rem;
      text-align: left;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: #4b5563;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 0.8rem;
      border: 2px solid #fecdd3;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.3s;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: #f43f5e;
    }

    .btn-submit {
      width: 100%;
      background: #f43f5e;
      margin-top: 1rem;
      font-size: 1.2rem;
    }

    /* Final Message */
    .final-message {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.95);
      padding: 3rem;
      border-radius: 24px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      z-index: 200;
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      max-width: 90%;
    }

    .final-message h2 {
      font-size: 2rem;
      color: #e11d48;
    }

    /* Keyframes */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes popIn {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.5);
      }

      100% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    @keyframes floatHeart {
      0% {
        transform: translateY(100vh) scale(0);
        opacity: 0;
      }

      20% {
        opacity: 1;
      }

      100% {
        transform: translateY(-100px) scale(1.5) rotate(45deg);
        opacity: 0;
      }
    }

    /* Teddy gentle float bob */
    @keyframes floatTeddy {
      0% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-10px);
      }

      100% {
        transform: translateY(0px);
      }
    }

    /* Shake on NO click */
    @keyframes shake {
      0% {
        transform: translateX(0);
      }

      20% {
        transform: translateX(-8px);
      }

      40% {
        transform: translateX(8px);
      }

      60% {
        transform: translateX(-6px);
      }

      80% {
        transform: translateX(6px);
      }

      100% {
        transform: translateX(0);
      }
    }

    .shake {
      animation: shake 0.35s ease forwards !important;
    }

    .heart {
      position: absolute;
      color: #f43f5e;
      font-size: 2rem;
      animation: floatHeart 4s linear infinite;
    }

    /* Confetti */
    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      background: #f00;
      animation: fall 3s linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh) rotate(720deg);
      }
    }

    /* Dual celebration teddy layout */
    .celebration-teddies {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 1.5rem;
      margin: 1rem 0 1.5rem;
    }

    .celebration-teddies img {
      width: 130px;
      height: 130px;
      object-fit: contain;
      border-radius: 16px;
      animation: floatTeddy 2.5s ease-in-out infinite;
    }

    .celebration-teddies img:nth-child(2) {
      /* Offset second bear so they bob alternately */
      animation-delay: 0.6s;
    }

    /* ── Gift Transition Overlay ────────────────────────────────────────────── */
    #giftTransition {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #ff9a9e, #fecfef);
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: background 2.5s ease, opacity 0.5s ease;
    }

    #giftTransition.active {
      opacity: 1;
      pointer-events: auto;
      background: #000;
    }

    /* Stars layer */
    #stars {
      position: fixed;
      inset: 0;
      z-index: 55;
      pointer-events: none;
      overflow: hidden;
      display: none;
    }

    .star {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--dur, 2s) ease-in-out infinite;
    }

    @keyframes twinkle {

      0%,
      100% {
        opacity: 0.2;
        transform: scale(1);
      }

      50% {
        opacity: 1;
        transform: scale(1.6);
      }
    }

    /* Gift box */
    #giftBox {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 1rem;
    }

    #giftBox .gift-wrap {
      position: relative;
      cursor: pointer;
      animation: scalePop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards,
        floatGift 3s ease-in-out 0.7s infinite;
      filter: drop-shadow(0 0 18px rgba(255, 100, 150, 0.7));
    }

    #giftBox .gift-wrap .gift-emoji {
      font-size: 9rem;
      display: block;
      user-select: none;
      transition: transform 0.3s ease;
    }

    #giftBox .gift-wrap:hover .gift-emoji {
      filter: brightness(1.2);
    }

    #giftBox .gift-lid {
      position: absolute;
      top: -0.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 4rem;
      transition: transform 0.5s ease, opacity 0.5s ease;
    }

    #giftBox .gift-label {
      color: white;
      font-size: 1.3rem;
      font-weight: 600;
      text-shadow: 0 0 12px rgba(255, 150, 180, 0.9);
      animation: pulse 1.5s ease-in-out infinite;
    }

    #giftBox.opening .gift-lid {
      transform: translateX(-50%) translateY(-60px) rotate(-30deg);
      opacity: 0;
    }

    #giftBox.opening .gift-emoji {
      animation: burstOpen 0.4s ease forwards;
    }

    /* Sparkles around gift */
    .sparkle {
      position: fixed;
      font-size: 1.5rem;
      pointer-events: none;
      z-index: 65;
      animation: sparkleFloat 1s ease-out forwards;
    }

    @keyframes sparkleFloat {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }

      100% {
        opacity: 0;
        transform: translate(var(--sx), var(--sy)) scale(0.3);
      }
    }

    /* Book / Date reveal section */
    #bookSection {
      position: fixed;
      inset: 0;
      z-index: 70;
      display: none;
      justify-content: center;
      align-items: center;
      background: radial-gradient(ellipse at center, #1a0033 0%, #000 100%);
    }

    #bookSection .book-card {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 28px;
      padding: 2.5rem 2rem;
      text-align: center;
      max-width: 90%;
      width: 460px;
      box-shadow: 0 0 60px rgba(244, 63, 94, 0.3);
      animation: revealCard 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    #bookSection .book-card h2 {
      color: #f9a8d4;
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }

    #bookSection .book-card p {
      color: rgba(255, 255, 255, 0.75);
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    #bookSection .book-card .form-group label {
      color: rgba(255, 255, 255, 0.8);
    }

    #bookSection .book-card input,
    #bookSection .book-card select {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(244, 63, 94, 0.5);
      color: white;
    }

    #bookSection .book-card input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    #bookSection .book-card input:focus,
    #bookSection .book-card select:focus {
      border-color: #f43f5e;
    }

    #bookSection .book-card select option {
      background: #1a0033;
    }

    #bookSection .book-card .btn-submit {
      background: linear-gradient(45deg, #f43f5e, #a855f7);
      font-size: 1.1rem;
    }

    #bookSection .book-card .btn-submit:hover {
      box-shadow: 0 0 20px rgba(244, 63, 94, 0.7);
    }

    /* Date confirmed screen inside bookSection */
    #dateConfirmed {
      display: none;
      color: white;
    }

    #dateConfirmed h2 {
      font-size: 2rem;
      color: #f9a8d4;
      margin-bottom: 0.5rem;
    }

    #dateConfirmed p {
      font-size: 1.2rem;
      color: rgba(255, 255, 255, 0.8);
    }

    #dateConfirmed .big-emoji {
      font-size: 5rem;
      margin: 1rem 0;
    }

    /* ── Override #bookSection to fill screen (dark, full, centered) ── */
    #bookSection {
      position: fixed;
      inset: 0;
      z-index: 70;
      display: none;
      /* shown by JS after gift opens */
      justify-content: center;
      align-items: center;
      background: #000;
      /* pure black matches the book theme */
      overflow: hidden;
    }

    /* Make the book-section inside fill the screen nicely */
    #bookSection .book-section {
      margin-top: 0;
      height: 100vh;
      width: 100vw;
    }

    .btn-gift {
      background: linear-gradient(45deg, #f43f5e, #e11d48);
      font-size: 1.3rem;
      padding: 1rem 2rem;
      margin-top: 1.5rem;
      animation: pulse 2s ease-in-out infinite;
    }

    .btn-gift:hover {
      box-shadow: 0 0 28px rgba(244, 63, 94, 0.8);
      transform: scale(1.08);
      animation-play-state: paused;
      /* pause pulse on hover */
    }

    /* Keyframes for gift flow */
    @keyframes scalePop {
      0% {
        opacity: 0;
        transform: scale(0);
      }

      80% {
        transform: scale(1.1);
      }

      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes floatGift {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-18px);
      }
    }

    @keyframes burstOpen {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.25);
        filter: brightness(1.6);
      }

      100% {
        transform: scale(1);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 0 8px rgba(244, 63, 94, 0.4);
      }

      50% {
        box-shadow: 0 0 22px rgba(244, 63, 94, 0.85);
      }
    }

    @keyframes revealCard {
      0% {
        opacity: 0;
        transform: scale(0.7) translateY(40px);
      }

      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    /* ── 27-click unlock keyframes ─────────────────────────────────────────── */
    /* Quick bounce on each click */
    @keyframes bounceClick {
      0% {
        transform: scale(1);
      }

      40% {
        transform: scale(1.13);
      }

      70% {
        transform: scale(0.96);
      }

      100% {
        transform: scale(1);
      }
    }

    /* Sideways shake */
    @keyframes shakeBrief {

      0%,
      100% {
        transform: translateX(0);
      }

      20% {
        transform: translateX(-7px);
      }

      50% {
        transform: translateX(7px);
      }

      80% {
        transform: translateX(-4px);
      }
    }

    /* Glow ring flash */
    @keyframes glowFlash {

      0%,
      100% {
        filter: drop-shadow(0 0 18px rgba(255, 100, 150, 0.7));
      }

      50% {
        filter: drop-shadow(0 0 48px rgba(255, 220, 80, 1));
      }
    }

    /* Full-screen white flash on the 27th click */
    @keyframes screenFlash {
      0% {
        opacity: 0;
      }

      20% {
        opacity: 0.85;
      }

      100% {
        opacity: 0;
      }
    }

    #screenFlashEl {
      position: fixed;
      inset: 0;
      background: white;
      z-index: 200;
      pointer-events: none;
      opacity: 0;
    }

    #screenFlashEl.flash {
      animation: screenFlash 0.7s ease forwards;
    }
  </style>
</head>

<body>

  <!-- Storytelling Audio Assets -->
  <audio id="intro-music" src="thousand_years.mp3" loop></audio>
  <audio id="book-music" src="Gehra Hua (PenduJatt.Com.Se).mp3" loop></audio>

  <div class="hearts-container" id="hearts-container"></div>

  <!-- Proposal UI -->
  <div class="card" id="proposal-card">
    <h1 id="question">🧸 Will you be my Valentine? 💕</h1>
    <div class="gif-container">
      <!-- Step 0: happy/shy bubu — same kawaii mochi style as all NO-click states -->
      <img id="teddy" src="https://media.tenor.com/9bn_EpSg5KoAAAAM/happy.gif" alt="Bubu happy" class="teddy-float">
    </div>
    <div class="buttons" id="buttons-container">
      <button class="btn-yes" id="btn-yes">Yes 💚</button>
      <button class="btn-no" id="btn-no">No</button>
    </div>
  </div>

  <!-- Celebration UI (YES page) — verified bubu-dudu celebration GIFs -->
  <div class="celebration-screen" id="celebration-screen">
    <h1>🧸❤️🧸 Finally!!!</h1>
    <p>You made me the happiest person 🥹💖</p>
    <div class="celebration-teddies">
      <!-- Bubu bride / wedding celebration -->
      <img id="celeb-gif-1" src="https://media.tenor.com/WHc5Ev8K4AoAAAAM/bubu-dudu-bride.gif"
        alt="Bubu bride celebrating">
      <!-- Bubu & Dudu dancing together -->
      <img id="celeb-gif-2" src="https://media.tenor.com/W37fJCYOM74AAAAM/bubu-dancing-dance.gif" alt="Bubu dancing">
    </div>
    <!-- Changed: was "Plan Our Date", now triggers Gift flow -->
    <button class="btn-gift" id="btn-gift">Want a Gift? 🎁</button>
  </div>

  <!-- Gift Transition dark overlay -->
  <div id="giftTransition"></div>

  <!-- Stars container (replaces hearts in dark mode) -->
  <div id="stars"></div>

  <!-- Gift Box screen -->
  <div id="giftBox">
    <div class="gift-wrap" id="giftWrap">
      <span class="gift-emoji">🎁</span>
    </div>
  </div>

  <!-- Full-screen white flash element (for 27th click cinematic) -->
  <div id="screenFlashEl"></div>

  <!-- Book revealed after gift opens (same book as script.js / style.css) -->
  <div id="bookSection">
    <!-- Hearts from the original book experience -->
    <div id="hearts-container-book"></div>
    <!-- Book scaffold (leaves injected by initBook()) -->
    <section class="book-section">
      <div class="book-container" id="book-container">
        <div class="book-transform" id="book-transform">
          <div class="book-float">
            <div class="book closed-front" id="ancient-book">
              <div class="book-cover-back-fixed"></div>
              <div class="book-spine"></div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>



  <script>
    // ── DOM References ──────────────────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        document.body.classList.add("loaded");
      }, 1000);
    });

    const proposalCard = document.getElementById('proposal-card');
    const celebrationScreen = document.getElementById('celebration-screen');
    const btnYes = document.getElementById('btn-yes');
    const btnNo = document.getElementById('btn-no');
    const btnGift = document.getElementById('btn-gift');       // NEW
    const giftTransition = document.getElementById('giftTransition'); // NEW
    const starsEl = document.getElementById('stars');          // NEW
    const giftBoxEl = document.getElementById('giftBox');        // NEW
    const giftWrap = document.getElementById('giftWrap');       // NEW
    const bookSection = document.getElementById('bookSection');    // NEW
    const heartsContainer = document.getElementById('hearts-container');
    const teddyEl = document.getElementById('teddy');
    const introMusic = document.getElementById('intro-music');
    const bookMusic = document.getElementById('book-music');
    let introStarted = false;
    const questionEl = document.getElementById('question');

    // ── Teddy State Data (Bubu & Dudu — verified kawaii mochi style) ───────────────────
    // Index 0 = initial happy state (proposal page, step 0)
    // Indices 1–9 = NO progression: neutral → confused → sad → crying → devastated
    // All characters are the same Bubu/Dudu white chubby kawaii panda style ✓
    const teddyStates = [
      // [0] Happy/shy — initial proposal page state
      {
        gif: "https://media.tenor.com/9bn_EpSg5KoAAAAM/happy.gif",
        emoji: "🧸🙂"
      },
      // [1] Happy with hearts — first NO (still hopeful)
      {
        gif: "https://media.tenor.com/4K9ZXuExtoMAAAAM/hearts-heart-beat.gif",
        emoji: "🧸🙂"
      },
      // [2] Confused/huh — slightly worried
      {
        gif: "https://media.tenor.com/UtMNx2yDPkMAAAAM/bubu-confused-bubu-huh.gif",
        emoji: "🧸😕"
      },
      // [3] "Wat" — puzzled/disbelief
      {
        gif: "https://media.tenor.com/w06oiiEwivIAAAAM/bubu-wat.gif",
        emoji: "🧸🤔"
      },
      // [4] Sad pouty — first real sadness
      {
        gif: "https://media.tenor.com/i795mJFL_YoAAAAM/bubu-dudu.gif",

        leaf.appendChild(front);
        leaf.appendChild(back);
        book.appendChild(leaf);
        leaves.push({ leaf, zClosed, zFlipped, i });
      }

      // ── Hint overlay (tap left / right) ──────────────────────────────────────
      const hint = document.createElement('div');
      hint.id = 'book-hint';
      hint.innerHTML = `
        <span class="hint-arrow hint-left">‹ Prev</span>
        <span class="hint-label">tap to turn page</span>
        <span class="hint-arrow hint-right">Next ›</span>`;
      bookContainer.appendChild(hint);
      // Auto-hide hint after first flip
      let hintHidden = false;
      function hideHint() {
        if (hintHidden) return;
        hintHidden = true;
        hint.style.opacity = '0';
        setTimeout(() => hint.remove(), 600);
      }

      // ── updateBookPosition ────────────────────────────────────────────────────
      function updateBookPosition() {
        if (currentLeaf === 0) book.className = 'book closed-front';
        else if (currentLeaf === numLeaves) book.className = 'book closed-back';
        else book.className = 'book opened';
      }

      // ── Flip helpers ──────────────────────────────────────────────────────────
      function flipForward() {
        if (currentLeaf >= numLeaves) return;
        const { leaf, zFlipped, i } = leaves[currentLeaf];
        leaf.classList.add('flipped');
        
        // Use a high z-index during transition to keep the flipping page on top,
        // then set the correct final z-index.
        leaf.style.zIndex = 100; 
        leaf.style.transform = `translateZ(${zFlipped}px) rotateY(-180deg)`;
        
        setTimeout(() => {
          leaf.style.zIndex = i + 1;
        }, 600); // Wait for half the transition time

        currentLeaf++;
        updateBookPosition();
        hideHint();
      }
      function flipBack() {
        if (currentLeaf <= 0) return;
        const { leaf, zClosed, i } = leaves[currentLeaf - 1];
        leaf.classList.remove('flipped');
        
        // High z-index during turn-back too
        leaf.style.zIndex = 100;
        leaf.style.transform = `translateZ(${zClosed}px) rotateY(0deg)`;
        
        setTimeout(() => {
          leaf.style.zIndex = numLeaves - i;
        }, 600);

        currentLeaf--;
        updateBookPosition();
        hideHint();
      }

      // ── Pointer: click right half → forward, click left half → backward ───────
      let clickStartX = 0, clickStartY = 0, clickMoved = false;

      bookContainer.addEventListener('pointerdown', e => {
        clickStartX = e.clientX;
        clickStartY = e.clientY;
        clickMoved = false;
      });
      bookContainer.addEventListener('pointermove', e => {
        if (Math.abs(e.clientX - clickStartX) > 8 ||
          Math.abs(e.clientY - clickStartY) > 8) {
          clickMoved = true;
        }
      });
      bookContainer.addEventListener('pointerup', e => {
        if (clickMoved) return;
        const rect = bookContainer.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        if (e.clientX > centerX) flipForward();
        else flipBack();
      });

      // ── Touch swipe support ────────────────────────────────────────────────────
      let touchStartX = 0, touchStartY = 0;
      bookContainer.addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].clientX;
        touchStartY = e.changedTouches[0].clientY;
      }, { passive: true });
      bookContainer.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;
        if (Math.abs(dx) < 30 && Math.abs(dy) < 30) return; // not a real swipe
        if (Math.abs(dx) > Math.abs(dy)) {
          if (dx < 0) flipForward();  // swipe left → next
          else flipBack();     // swipe right → prev
        }
      }, { passive: true });

      // ── Keyboard support ──────────────────────────────────────────────────────
      document.addEventListener('keydown', e => {
        if (bookSection.style.display === 'flex') {
          if (e.key === 'ArrowRight' || e.key === 'ArrowDown') flipForward();
          if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') flipBack();
        }
      });

      // ── 360° drag rotation ────────────────────────────────────────────────────
      let isDragging = false, dragStartX = 0, dragStartY = 0;
      let currentRotX = 5, currentRotY = 0, currentScale = 1;
      if (bookTransform)
        bookTransform.style.transform = `scale(${currentScale}) rotateX(${currentRotX}deg) rotateY(${currentRotY}deg)`;

      document.addEventListener('pointerdown', e => { isDragging = true; dragStartX = e.clientX; dragStartY = e.clientY; });
      document.addEventListener('pointermove', e => {
        if (!isDragging || !bookTransform) return;
        currentRotY += (e.clientX - dragStartX) * 0.4;
        currentRotX -= (e.clientY - dragStartY) * 0.4;
        dragStartX = e.clientX; dragStartY = e.clientY;
        bookTransform.style.transform = `scale(${currentScale}) rotateX(${currentRotX}deg) rotateY(${currentRotY}deg)`;
      });
      document.addEventListener('pointerup', () => { isDragging = false; });

      if (bookContainer) {
        bookContainer.addEventListener('wheel', e => {
          e.preventDefault();
          currentScale = Math.min(Math.max(0.4, currentScale + e.deltaY * -0.001), 3.5);
          bookTransform.style.transform = `scale(${currentScale}) rotateX(${currentRotX}deg) rotateY(${currentRotY}deg)`;
        }, { passive: false });

        let zoomToggled = false;
        bookContainer.addEventListener('dblclick', () => {
          zoomToggled = !zoomToggled;
          currentScale = zoomToggled ? 2.5 : 1;
          bookTransform.style.transform = `scale(${currentScale}) rotateX(${currentRotX}deg) rotateY(${currentRotY}deg)`;
          bookTransform.style.transition = 'transform 0.3s ease';
          setTimeout(() => { bookTransform.style.transition = 'transform 0.1s linear'; }, 300);
        });
      }
    }
  </script>
</body>

</html>
